<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Title</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="header">
      <img src="/logo.jpg" />
      <nav class="nav">
        <ul class="first-nav">
          <li>
            <i class="fa-solid fa-circle-user"></i>
            <div>RESIDENTS</div>
          </li>
          <li>
            <i class="fa-solid fa-house"></i>
            <div>REALTORS</div>
          </li>
        </ul>
        <ul class="second-nav">
          <li>HOME</li>
          <li>WHO WE ARE</li>
          <li>LIFESTYLE AND AMENITIES</li>
          <li>VISIT US</li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="slider">
        <div class="slider-text">
          <h1 className="slider-heading" style="text-align: center">
            Enjoy River, Mountain and Woodland
            <span class="slider-span">Views</span>
          </h1>
        </div>

        <div class="slider-media">
          <video
            height="700"
            style="max-width: 1048px; border-radius: 18px"
            autoplay
          >
            <source src="video-1.mp4" />
          </video>
        </div>
      </section>

      <section class="slider">
        <div class="slider-text">
          <h1 className="slider-heading" style="text-align: center">
            Retirement Living <span class="slider-span">Designed</span> by You
          </h1>
        </div>

        <div class="slider-media">
          <img src="/slide_one/1.jpg" class="image-one" />
          <div class="slider-image-group">
            <img src="/slide_one/3.jpg" class="image-two" />
            <img src="/slide_one/3.jpg" class="image-three" />
          </div>
        </div>
      </section>

      <section class="slider">
        <div class="slider-text">
          <h1 className="slider-heading" style="text-align: center">
            Keep Fit and Stay <span class="slider-span">Healthy</span>
          </h1>
        </div>

        <div class="slider-media">
          <img src="/slide_two/1.jpg" class="image-one" />
          <div class="slider-image-group">
            <img src="/slide_two/2.jpg" class="image-two" />

            <iframe
              height="346"
              className="image-three"
              src="https://www.youtube.com/embed/G63-OR7NCG8?si=WcU6jEElZ42lgBhF"
              title="YouTube video player"
              frameborder="0"
              allow="
                accelerometer;
                autoplay;
                clipboard-write;
                encrypted-media;
                gyroscope;
                picture-in-picture;
                web-share;
              "
              referrerpolicy="strict-origin-when-cross-origin"
              allowfullscreen
            ></iframe>
          </div>
        </div>
      </section>

      <section class="slider">
        <div class="slider-text">
          <h1 className="slider-heading" style="text-align: center">
            Persue Your<span class="slider-span">Passions</span> and Make
            Friends
          </h1>
        </div>

        <div class="slider-media">
          <img src="/slide_three/1.jpg" class="image-one" />
          <div class="slider-image-group">
            <img src="/slide_one/3.jpg" class="image-two" />
            <img src="/slide_three/3.jpg" class="image-three" />
          </div>
        </div>
      </section>

      <section class="slider">
        <div class="slider-text">
          <h1 className="slider-heading" style="text-align: center">
            All you need<span class="slider-span">Close</span>to Home
          </h1>
        </div>

        <div class="slider-media">
          <img src="/slide_four/1.jpg" class="image-one" />
          <div class="slider-image-group">
            <img src="/slide_four/2.jpg" class="image-two" />
            <img src="/slide_three/3.jpg" class="image-three" />
          </div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
